name: keep-warm

# wonb.kr(원비) 운영 함수를 깨워 콜드스타트를 줄인다.
# public repo 이므로 GitHub Actions 는 무제한 무료(비용 0). wonb 코드는 담지 않는다.
#
# GitHub cron 최소 간격은 5분이라, 한 실행이 그 자리에서 ~4.5분간 짧은 간격으로
# 반복 핑 → 다음 5분 cron이 이어받아 사실상 상시 웜 유지. (Pro 업그레이드 대체)
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# 동시에 두 실행이 겹쳐 돌지 않게(낭비 방지)
concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Warm wonb (~4.5분간 20초 간격, 경로별 병렬)
        run: |
          # Fluid Compute는 여러 인스턴스로 분산되고 idle 시 회수된다.
          # (1) /api/health + /login 두 경로 (2) 각 경로 병렬 4개로 여러 인스턴스
          # (3) 20초 간격 반복으로 잠들 틈을 없앤다.
          PATHS="/api/health /login"
          FANOUT=4
          INTERVAL=20
          DURATION=270   # 약 4.5분 (다음 cron이 이어받음)
          ping() {
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}:%{time_total}s" \
              --max-time 20 "https://wonb.kr$1" || echo "000:0")
            echo "  $1 -> $code"
          }
          END=$((SECONDS + DURATION))
          round=0
          while [ $SECONDS -lt $END ]; do
            round=$((round + 1))
            echo "--- round $round (t=${SECONDS}s) ---"
            for p in $PATHS; do
              for i in $(seq 1 $FANOUT); do ping "$p" & done
            done
            wait
            [ $SECONDS -lt $END ] && sleep $INTERVAL
          done
          echo "done: $round rounds"
