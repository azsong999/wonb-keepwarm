name: keep-warm

# wonb.kr(원비) 운영 함수를 5분마다 깨워 콜드스타트를 줄인다.
# public repo 이므로 GitHub Actions 는 무제한 무료. wonb 코드는 전혀 담지 않는다.
on:
  schedule:
    - cron: "*/5 * * * *" # 5분마다 (UTC, GitHub 스케줄러 사정상 다소 지연될 수 있음)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping wonb (여러 경로 · 병렬로 여러 인스턴스 깨우기)
        run: |
          # Fluid Compute는 요청을 여러 인스턴스로 분산한다. health 한 개만
          # 치면 그 코드 경로/인스턴스만 데워지고, 사용자가 실제로 닿는
          # /login 같은 페이지는 콜드로 남는다. 그래서 (1) 경로를 늘리고
          # (2) 각 경로를 병렬로 여러 번 쳐서 동시에 여러 인스턴스를 깨운다.
          PATHS="/api/health /login"
          FANOUT=6
          ping() {
            local code t
            read code t < <(curl -s -o /dev/null -w "%{http_code} %{time_total}" \
              --max-time 25 "https://wonb.kr$1" || echo "000 0")
            echo "  $1 -> HTTP $code  ${t}s"
          }
          for p in $PATHS; do
            echo "== $p (x$FANOUT 병렬) =="
            for i in $(seq 1 $FANOUT); do ping "$p" & done
            wait
          done
          # 웜핑 목적이므로 실패해도 워크플로는 통과시킨다.
          echo "done"
