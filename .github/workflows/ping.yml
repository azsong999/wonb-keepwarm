name: keep-warm

# wonb.kr(원비) 운영 함수를 5분마다 깨워 콜드스타트를 줄인다.
# public repo 이므로 GitHub Actions 는 무제한 무료. wonb 코드는 전혀 담지 않는다.
on:
  schedule:
    - cron: "*/5 * * * *" # 5분마다 (UTC)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping wonb health
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://wonb.kr/api/health || echo "000")
          echo "health: HTTP $code"
          # 웜핑 목적이므로 실패해도 워크플로는 통과시킨다.
